<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bootstrap Робота з зображеннями 9</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <div class="container mt-4">
        <h2>Картинка з рамкою</h2>
        <img src="https://itproger.com/img/courses/1481188465.jpg" class="img-thumbnail" alt="Фотографія">
    </div>

    <!-- Завдання 4 -->
    <div class="container mt-5">
        <h2>Підпис до зображення</h2>
        <figure class="figure">
            <img src="https://itproger.com/img/courses/1481188465.jpg" class="figure-img img-fluid rounded" alt="Фотографія">
            <figcaption class="figure-caption">Невеликий підпис знизу</figcaption>
        </figure>
    </div>

    <div class="container mt-5 d-flex gap-4">
        <div class="card" style="width: 18rem;">
            <img class="card-img-top" src="https://upload.wikimedia.org/wikipedia/commons/3/33/Fronalpstock_big.jpg" alt="Гори">
            <div class="card-body">
                <h5 class="card-title">Гори</h5>
                <p class="card-text">Гори — це великі природні підвищення земної поверхні, які мають мальовничі краєвиди.</p>
                <a href="https://uk.wikipedia.org/wiki/Гора" class="btn btn-success">Прочитати більше</a>
            </div>
        </div>

        <div class="card" style="width: 18rem;">
            <img class="card-img-top" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Golde33443.jpg" alt="Океан">
            <div class="card-body">
                <h5 class="card-title">Океан</h5>
                <p class="card-text">Океан — найбільша частина Світового океану, що вкриває значну частину Землі.</p>
                <a href="https://uk.wikipedia.org/wiki/Океан" class="btn btn-info">Прочитати більше</a>
            </div>
        </div>
    </div>

</body>
</html>
